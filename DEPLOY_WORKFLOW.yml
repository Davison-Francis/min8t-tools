name: Deploy to Cloudflare Pages + Worker

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch: {}

# Required secrets in repo settings → Secrets and variables → Actions:
#   CLOUDFLARE_API_TOKEN — Workers (Scripts + Routes) token
#   CLOUDFLARE_ACCOUNT_ID — 626e6ac44d135aa0f72c82e6ed5761af
# Pre-existing infra (already provisioned manually 2026-04-29):
#   - Pages project: min8t-tools (production_branch: main)
#   - Worker:        min8t-tools-router
#   - Routes:        min8t.com/tools/*  and  min8t.com/tools

jobs:
  deploy-pages:
    name: Deploy static site to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the repo root (everything except `workers/` which is the Worker).
          # Anything we don't want shipped to Pages should be added to a Pages-specific
          # ignore list (we'll add `.cloudflareignore` if/when needed).
          command: pages deploy . --project-name=min8t-tools --branch=main --commit-dirty=true

  deploy-worker:
    name: Deploy path-routing Worker
    runs-on: ubuntu-latest
    # Only re-deploy the Worker when the Worker source actually changed —
    # it's stable scaffolding, not per-commit.
    if: contains(github.event.head_commit.modified, 'workers/')
       || contains(github.event.head_commit.added,    'workers/')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy
